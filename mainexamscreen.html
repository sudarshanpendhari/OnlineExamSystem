<html>

<head>
    <title id="title1">
        BPSC AE Civil: Hydraulics Quiz
    </title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" rel="stylesheet" />
    <link rel="stylesheet" href="./mainexamscreen.css" />
    <script defer type="module" src="mainexamscreen.js"></script>
</head>

<body class="mbody">
    <div class="container-fluid">
        <div class="row header">
            <div class="col-6">
                <h1 id="title">
                    BPSC AE Civil: Hydraulics Quiz
                </h1>
            </div>
            <div class="col-6 timer justify-content-between">
                <span>
                    Time Left
                </span>
                <span id="time" class="badge bg-secondary">
                    00 : 05 : 54
                </span>
                <span>
                    <button id="instructions" class="btn btn-info">
                        Instructions
                    </button>
                </span>


            </div>

        </div>
        <div class="row">
            <div class="col-9 question-section">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>
                        Live Quiz
                    </h2>
                    <div>
                        <span id="positivemarking" class="badge bg-success">
                            +2
                        </span>
                        <span id="negativemarking" class="badge bg-danger">
                            -0
                        </span>




                    </div>
                </div>
                <div class="question">
                    <p>
                        Question No. <span id="qnumber">1</span>
                    </p>
                    <p id="question">
                        The atmospheric pressure head is ________ mm of mercury.
                    </p>
                </div>
                <ul class="options">
                    <li>
                        <input id="option1" name="option" type="radio" />
                        <label for="option1" id="option1text">
                            9.81
                        </label>
                    </li>
                    <li>
                        <input id="option2" name="option" type="radio" />
                        <label for="option2" id="option2text">
                            760
                        </label>
                    </li>
                    <li>
                        <input id="option3" name="option" type="radio" />
                        <label for="option3" id="option3text">
                            10.33
                        </label>
                    </li>
                    <li>
                        <input id="option4" name="option" type="radio" />
                        <label for="option4" id="option4text">
                            9810
                        </label>
                    </li>
                </ul>
                <div class="d-flex  footer">
                    <button id="mark" class="btn btn-primary">
                        Mark for Review &amp; Next
                    </button>
                    <button id="clear" class="btn btn-secondary">
                        Clear Response
                    </button>
                    <button id="saveandnext" class="btn btn-info">
                        Save & Next
                    </button>
                </div>
            </div>
            <div class="col-3 sidebar">
                <div class="user-info">
                    <img alt="User profile picture" height="50"
                        src="https://storage.googleapis.com/a1aa/image/0zes51e42TlBw0rAqxkqZTjKKUPaPNcfsDTf4pWklY6RUYNOB.jpg"
                        width="50" />
                    <p id="profilenm">
                        sudarshan
                    </p>
                </div>
                <div class="question-nav">
                    <!-- Buttons will be generated here dynamically -->
                </div>

                <div class="d-flex justify-content-center mt-3">
                    <button id="submit" class="btn btn-primary">
                        Submit Test
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
